<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz QR Code</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f8fafc;display:flex;
     align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:white;border-radius:20px;padding:36px;box-shadow:0 4px 24px rgba(0,0,0,.12);
      max-width:420px;width:100%;text-align:center}
.logo{font-size:40px;margin-bottom:8px}
.title{font-size:22px;font-weight:900;color:#1e1b4b;margin-bottom:4px}
.subtitle{font-size:13px;color:#6b7280;margin-bottom:24px;line-height:1.5}
.std-badge{display:inline-block;background:#eef2ff;color:#4f46e5;font-size:12px;
           font-weight:800;padding:4px 12px;border-radius:20px;margin-bottom:6px}
.std-title{font-size:15px;font-weight:700;color:#312e81;margin-bottom:24px}
.qr-wrap{background:white;border:4px solid #6366f1;border-radius:16px;
         padding:16px;display:inline-block;margin-bottom:20px}
#qrcode canvas,#qrcode img{border-radius:4px}
.url-box{background:#f5f3ff;border-radius:10px;padding:10px 14px;
         font-family:monospace;font-size:10px;color:#4f46e5;
         word-break:break-all;line-height:1.6;margin-bottom:24px;text-align:left}
.student-tag{background:#f0fdf4;border:2px solid #6ee7b7;border-radius:10px;
             padding:8px 16px;font-size:14px;font-weight:800;color:#065f46;
             margin-bottom:20px;display:inline-block}
.print-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;
           border:none;border-radius:12px;padding:14px 32px;font-size:16px;
           font-weight:900;cursor:pointer;width:100%;margin-bottom:10px}
.print-btn:hover{opacity:.9}
.hint{font-size:11px;color:#94a3b8;line-height:1.5}
.err{color:#dc2626;font-size:14px;font-weight:700;padding:20px}
@media print{
  body{background:white}
  .card{box-shadow:none;border:none;max-width:100%}
  .print-btn,.hint,.url-box{display:none}
  .qr-wrap{border-color:#000}
}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">🎓</div>
  <div class="title">MN Standards Quiz</div>
  <div class="subtitle" id="subtitle">Loading...</div>
  <div id="student-tag"></div>
  <div id="std-info"></div>
  <div class="qr-wrap">
    <div id="qrcode"></div>
  </div>
  <div class="url-box" id="url-box"></div>
  <button class="print-btn" onclick="window.print()">🖨️ Print This QR Code</button>
  <div class="hint">Students scan this with any phone camera to open the quiz on their device.</div>
</div>
<script>
(function(){
  /* Parse the quiz URL from our ?url= parameter */
  var params=new URLSearchParams(window.location.search);
  var quizUrl=params.get('url');
  var studentName=params.get('n');
  var stdCode=params.get('c');
  var stdTitle=params.get('t');
  var mode=params.get('mode')||'single'; /* single or class */

  if(!quizUrl){
    document.getElementById('subtitle').innerHTML='<span class="err">No quiz URL provided. Open this page from the teacher hub.</span>';
    return;
  }

  /* Set info */
  var subtitleEl=document.getElementById('subtitle');
  var studentTagEl=document.getElementById('student-tag');
  var stdInfoEl=document.getElementById('std-info');

  if(mode==='class'){
    subtitleEl.textContent='Scan to take the quiz on your device';
    studentTagEl.innerHTML='<div class="student-tag">👥 Whole Class Quiz</div>';
  } else {
    subtitleEl.textContent='Scan to take your quiz on your device';
    if(studentName){
      studentTagEl.innerHTML='<div class="student-tag">👤 '+studentName+'</div>';
    }
  }

  if(stdCode||stdTitle){
    stdInfoEl.innerHTML=(stdCode?'<div class="std-badge">'+stdCode+'</div>':'')
      +(stdTitle?'<div class="std-title">'+stdTitle+'</div>':'');
  }

  document.getElementById('url-box').textContent=quizUrl;

  /* Generate QR code */
  try{
    new QRCode(document.getElementById('qrcode'),{
      text:quizUrl,
      width:260,
      height:260,
      colorDark:'#1e1b4b',
      colorLight:'#ffffff',
      correctLevel:QRCode.CorrectLevel.M
    });
  }catch(e){
    document.getElementById('qrcode').innerHTML='<div class="err">QR generation failed. Try refreshing.</div>';
  }
})();
</script>
</body>
</html>
